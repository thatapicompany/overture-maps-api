name: Live Endpoints E2E Tests

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  schedule:
    - cron: '0 0 * * *' # Example: run daily at midnight (optional)
  # Uncomment the following to run on push to main
  # push:
  #   branches: [ "main" ]

jobs:
  e2e-live-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Environment Variables
        run: |
          echo "TEST_API_KEY=${{ secrets.TEST_API_KEY }}" >> .env.test
          echo "BIGQUERY_PROJECT_ID=${{ secrets.BIGQUERY_PROJECT_ID }}" >> .env.test

      - name: Run Live E2E Tests
        run: npm run test:live
